<!DOCTYPE HTML>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Redirecting to Dark3R...</title>
    
    <!-- Meta refresh redirect (works even if JavaScript is disabled) -->
    <meta http-equiv="refresh" content="0; url=https://andrewyguo.github.io/dark3r_webpage/">
    
    <!-- Canonical link for SEO -->
    <link rel="canonical" href="https://andrewyguo.github.io/dark3r_webpage/">
    
    <script type="text/javascript">
      // JavaScript redirect as a fallback/backup
      window.location.href = "https://andrewyguo.github.io/dark3r_webpage/";
    </script>
  </head>
  <body>
    <!-- Fallback message for users with JavaScript disabled -->
    <p>Redirecting to <a href="https://andrewyguo.github.io/dark3r_webpage/">Dark3R webpage</a>...</p>
  </body>
</html>
